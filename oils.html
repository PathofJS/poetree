<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blight Oil Database</title>
    <!-- Pako library for gzip decompression -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 2em;
        }

        h2 {
            color: #ffffff;
            margin: 20px 0 15px 0;
            font-size: 1.3em;
        }

        table {
            width: auto;
            border-collapse: collapse;
            background: #3a3a3a;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            margin-bottom: 30px;
            border: 1px solid #3a3a3a;
            border-top: none;
        }

        .recipe-table {
            table-layout: auto;
            width: auto;
        }

        .recipe-table th:nth-child(1),
        .recipe-table td:nth-child(1) {
            width: 100px;
            font-size: 0.85em;
            padding: 6px 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .recipe-table th:nth-child(2),
        .recipe-table td:nth-child(2) {
            width: auto;
            font-size: 0.85em;
            padding: 6px 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .recipe-table th:nth-child(3),
        .recipe-table td:nth-child(3) {
            width: auto;
            font-size: 0.85em;
            padding: 6px 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        th {
            background: #3a3a3a;
            color: #ffffff;
            padding: 8px 10px;
            text-align: left;
            font-weight: bold;
            border-bottom: 1px solid #4a4a4a;
            font-size: 0.9em;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #4a4a4a;
            font-size: 0.9em;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            vertical-align: middle;
        }

        tr {
            height: auto;
        }

        tr:hover {
            background: #333333;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 0px;
            border-bottom: none;
        }

        .tab-btn {
            padding: 12px 25px;
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #3a3a3a;
            border-bottom: 1px solid #3a3a3a;
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #3a3a3a;
            border: 1px solid #3a3a3a;
            border-bottom: 1px solid #3a3a3a;
            color: #ffffff;
            position: relative;
            z-index: 1;
        }

        .tab-btn:hover {
            background: #333333;
        }

        .tab-content {
            display: none;
            margin-top: 0px;
        }

        .tab-content.active {
            display: block;
        }

        .recipes-container {
            display: flex;
            gap: 20px;
        }

        .filter-panel {
            width: 200px;
            flex-shrink: 0;
            background: #2a2a2a;
            padding: 15px;
            border: 1px solid #3a3a3a;
            border-radius: 2px;
            max-height: fit-content;
        }

        .filter-panel.hidden {
            display: none;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-title {
            font-weight: bold;
            font-size: 0.95em;
            color: #ffffff;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a3a;
        }

        .filter-pills {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 0;
            color: #ffffff;
            font-size: 0.9em;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-pill {
            padding: 6px 14px;
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
            user-select: none;
        }

        .filter-pill:hover {
            background: #333333;
            border-color: #4a4a4a;
        }

        .filter-pill.active {
            background: #4a7c59;
            border-color: #5a9c79;
            color: #ffffff;
        }

        .filter-pill.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #3a3a3a;
            border-radius: 0;
            background: #2a2a2a;
            color: #ffffff;
            font-size: 1em;
        }

        input[type="text"]::placeholder {
            color: #666666;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4a4a4a;
            background: #2a2a2a;
            box-shadow: none;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666666;
            border-top: 1px solid #3a3a3a;
        }

        .tier-color-0,
        .tier-color-1,
        .tier-color-2,
        .tier-color-3,
        .tier-color-4,
        .tier-color-5,
        .tier-color-6,
        .tier-color-7,
        .tier-color-8,
        .tier-color-9,
        .tier-color-10,
        .tier-color-11,
        .tier-color-12,
        .tier-color-13 {
            color: #ffffff;
        }

        small {
            display: block;
            color: #999999;
            font-size: 0.8em;
            margin-top: 3px;
            font-style: normal;
            line-height: 1.3;
        }

        td img {
            display: block;
            margin: auto;
            border-radius: 2px;
            transition: transform 0.2s ease;
        }

        tr:hover td img {
            transform: scale(1.2);
        }

        td:last-child {
            color: #999999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚗️ Blight Oil Database</h1>
        </header>

        <!-- Oil Data Table -->
        <h2>Oil Data</h2>
        <table id="oils-table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Oil Name</th>
                    <th>Short Name</th>
                    <th>Tier</th>
                    <th>Use Type</th>
                    <th>Drop Level</th>
                </tr>
            </thead>
            <tbody id="oils-tbody">
            </tbody>
        </table>

        <!-- Recipes Table with Tabs -->
        <h2>Recipes</h2>
        <div class="search-box">
            <input type="text" id="recipe-search" placeholder="Search recipes...">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all')">All</button>
            <button class="tab-btn" onclick="switchTab('amulet')">Unique Amulet (470)</button>
            <button class="tab-btn" onclick="switchTab('ring')">Ring (91)</button>
            <button class="tab-btn" onclick="switchTab('map')">Infected Map (13)</button>
        </div>

        <div class="recipes-container">
            <!-- Filter Panel (Sidebar) -->
            <div class="filter-panel" id="filter-panel">
                <!-- Oil Type Filters -->
                <div class="filter-section" id="oil-filter-section">
                    <div class="filter-title">Oil Types</div>
                    <div class="filter-pills" id="oil-filters">
                    </div>
                </div>

                <!-- Tower Type Filters -->
                <div class="filter-section hidden" id="tower-filter-section">
                    <div class="filter-title">Tower Types</div>
                    <div class="filter-pills" id="tower-filters">
                    </div>
                </div>
            </div>

            <!-- Recipes Tables -->
            <div style="flex: 1;">
                <!-- All Recipes Tab -->
                <div id="all" class="tab-content active">
                    <table class="recipe-table">
                        <thead>
                            <tr>
                                <th>Oils</th>
                                <th>Anoint</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="all-tbody">
                        </tbody>
                    </table>
                </div>

                <!-- Amulet Recipes Tab -->
                <div id="amulet" class="tab-content">
                    <table class="recipe-table">
                        <thead>
                            <tr>
                                <th>Oils</th>
                                <th>Anoint</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="amulet-tbody">
                        </tbody>
                    </table>
                </div>

                <!-- Ring Recipes Tab -->
                <div id="ring" class="tab-content">
                    <table class="recipe-table">
                        <thead>
                            <tr>
                                <th>Oils</th>
                                <th>Anoint</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="ring-tbody">
                        </tbody>
                    </table>
                </div>

                <!-- Map Recipes Tab -->
                <div id="map" class="tab-content">
                    <table class="recipe-table">
                        <thead>
                            <tr>
                                <th>Oil</th>
                                <th>Anoint</th>
                                <th></th>
                                
                            </tr>
                        </thead>
                        <tbody id="map-tbody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Path of Exile Blight Oil Database</p>
        </footer>
    </div>

    <script>
        // Storage for data loaded from JSON files
        let oils = [];
        let blightCraftingItems = [];
        let passiveSkillsMap = {};
        let modsMap = {};
        let statsMap = {};
        let statDescriptionsMap = {};
        let allRecipes = [];
        let allResults = [];
        let allMods = [];
        
        // Tower type filter
        let selectedTowerTypes = [];
        let selectedOils = [];
        const maxOilsByTab = {
            'all': 3,
            'amulet': 3,
            'ring': 2,
            'map': 1
        };
        const towerTypes = ['Arc', 'Chilling', 'Empowering', 'Fireball', 'Flamethrower', 'Freezebolt', 
                           'Glacial Cage', 'Imbuing', 'Lightning', 'Lightning Storm', 'Meteor', 'Scout', 
                           'Seismic', 'Sentinel', 'Shock Nova', 'Smothering', 'Stone Gaze', 'Summoning', 'Temporal'];

        // Helper function to substitute ALL placeholder formats
        // Handles: {}, {0}, {0:+d}, {0:d}, {:+d}, {:d}, {0:+}, etc.
        function substituteStatPlaceholders(template, statValues) {
            if (!template) return template;
            
            return template.replace(/\{[^}]*\}/g, function(placeholder) {
                // Extract content between braces
                const content = placeholder.slice(1, -1); // Remove { and }
                
                // Determine index from placeholder
                let index = 0;
                if (content && content[0].match(/[0-9]/)) {
                    index = parseInt(content[0]);
                }
                
                // Get the value at this index
                if (index < statValues.length) {
                    const value = statValues[index];
                    
                    // Check if this is a signed format (contains + or :+d)
                    if (content.includes(':+') || content.includes('+d')) {
                        // Format as signed: +10, -5, etc.
                        return value >= 0 ? '+' + value : '' + value;
                    } else {
                        // Regular format
                        return '' + value;
                    }
                }
                
                // If value not available, return placeholder as-is
                return placeholder;
            });
        }

        function getPassiveSkillName(skillId) {
            const skill = passiveSkillsMap[skillId];
            if (!skill) return `PassiveSkill ${skillId}`;
            
            // If it's still just a string (legacy), return it
            if (typeof skill === 'string') return skill;
            
            // Build description from stats
            let statDescriptions = [];
            
            if (skill.stats && skill.stats.length > 0) {
                skill.stats.forEach((statRid, index) => {
                    if (statRid) {
                        const statId = statsMap[statRid];
                        const template = statId ? statDescriptionsMap[statId] : null;
                        const value = skill.statValues[index];
                        
                        if (template && value !== undefined && value !== null) {
                            // Use comprehensive placeholder substitution
                            let displayText = substituteStatPlaceholders(template, [value]);
                            statDescriptions.push(displayText);
                        } else if (template && (value === 0 || value === null || value === undefined)) {
                            // If we have a template but no value, try using 0 or skip if all placeholders can't be filled
                            if (template.includes('{')) {
                                // Has placeholders - try with 0 if no value
                                const fillValue = value !== undefined ? value : 0;
                                let displayText = substituteStatPlaceholders(template, [fillValue]);
                                statDescriptions.push(displayText);
                            } else {
                                // No placeholders, just use the template text
                                statDescriptions.push(template);
                            }
                        } else if (!template && statId) {
                            // Stat ID exists but no description found
                            // Skip this one to avoid showing incomplete info
                        }
                    }
                });
            }
            
            // Return object with name and separate stat descriptions
            return {
                name: skill.name,
                stats: statDescriptions.join('\n')
            };
        }

        function getModName(modId) {
            const mod = allMods.find(m => m._rid === modId);
            if (!mod) return `Blight Mod #${modId}`;
            
            let displayName = '';
            
            // First, use the mod's Name if it exists
            if (mod.Name && mod.Name.trim()) {
                displayName = mod.Name;
            } else if (mod.StatsKey2) {
                // Build description from StatsKey2 (for mods without names)
                const statId = statsMap[mod.StatsKey2];
                let template = statId ? statDescriptionsMap[statId] : null;
                
                if (template && mod.Stat2Min !== undefined) {
                    // Use both Stat2Min and Stat2Max for potential {0} and {1} placeholders
                    displayName = substituteStatPlaceholders(template, [mod.Stat2Min, mod.Stat2Max]);
                } else if (statId) {
                    displayName = `${statId} ${mod.Stat2Min}`;
                }
            }
            
            // Now check if we need to append stat value(s) to the name
            let statDescription = '';
            
            // Check StatsKey1
            if (mod.StatsKey1 !== undefined && mod.StatsKey1 !== null) {
                const statId = statsMap[mod.StatsKey1];
                if (statId) {
                    const template = statDescriptionsMap[statId];
                    if (template && mod.Stat1Min !== undefined) {
                        // Use both Stat1Min and Stat1Max for potential {0} and {1} placeholders
                        statDescription = substituteStatPlaceholders(template, [mod.Stat1Min, mod.Stat1Max]);
                    }
                }
            }
            
            // Append stat description if found
            if (statDescription && displayName) {
                displayName = displayName + ': ' + statDescription;
            } else if (statDescription) {
                displayName = statDescription;
            }
            
            return displayName || `Mod ${modId}`;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async function() {
            await loadAllData();
            renderOils();
            initializeTowerFilters();
            renderRecipes('all');
        });

        // Load all data from JSON files
        async function loadAllData() {
            try {
                // Load oils from baseitemtypes.json (filter for RIDs 3795-3810)
                const baseItemsResponse = await fetch('data/baseitemtypes.json');
                const baseItemsData = await baseItemsResponse.json();
                oils = baseItemsData.filter(item => item._rid >= 3795 && item._rid <= 3810);

                // Load crafting items
                const craftingItemsResponse = await fetch('data/blightcraftingitems.json');
                blightCraftingItems = await craftingItemsResponse.json();

                // Load recipes and results
                const recipesResponse = await fetch('data/blightcraftingrecipes.json');
                const recipesData = await recipesResponse.json();
                allRecipes = recipesData.map(r => ({
                    _rid: r._rid || 0,
                    Id: r.Id || "",
                    items: r.BlightCraftingItemsKeys || [],
                    result: r.BlightCraftingResultsKey || 0,
                    type: r.BlightCraftingTypesKey || 0
                }));

                const resultsResponse = await fetch('data/blightcraftingresults.json');
                const resultsData = await resultsResponse.json();
                allResults = resultsData.map(r => ({
                    _rid: r._rid || 0,
                    PassiveSkill: r.PassiveSkill || null,
                    Mod: r.Mod || null
                }));

                // Load passive skills with descriptions
                const skillsResponse = await fetch('data/passiveskills.json');
                const skillsData = await skillsResponse.json();
                skillsData.forEach(skill => {
                    if (skill._rid && skill.Name) {
                        // Load all available stat values (Stat1Value through Stat10Value)
                        const statValues = [];
                        for (let i = 1; i <= 10; i++) {
                            const statKey = `Stat${i}Value`;
                            statValues.push(skill[statKey] !== undefined ? skill[statKey] : 0);
                        }
                        
                        passiveSkillsMap[skill._rid] = {
                            name: skill.Name,
                            stats: skill.Stats || [],
                            statValues: statValues
                        };
                    }
                });

                // Load stats mapping
                const statsResponse = await fetch('data/stats.json');
                const statsData = await statsResponse.json();
                statsData.forEach(stat => {
                    if (stat._rid && stat.Id) {
                        statsMap[stat._rid] = stat.Id;
                    }
                });

                // Load stat descriptions (gzip compressed, UTF-16LE)
                const descResponse = await fetch('metadata/statdescriptions/stat_descriptions.txt.gz');
                const descBuffer = await descResponse.arrayBuffer();
                
                // Decompress using pako
                const decompressed = pako.inflate(new Uint8Array(descBuffer));
                const decoder = new TextDecoder('utf-16le');
                const descText = decoder.decode(decompressed);
                parseStatDescriptions(descText);

                // Load mods with full data
                const modsResponse = await fetch('data/mods.json');
                const modsData = await modsResponse.json();
                allMods = modsData;
                
                console.log(`Before processing mods: statsMap has ${Object.keys(statsMap).length} entries, statDescriptionsMap has ${Object.keys(statDescriptionsMap).length} entries`);
                if (statsMap[993]) console.log(`  statsMap[993] = "${statsMap[993]}"`);
                
                // Check if our key stats have descriptions
                const testStatId = statsMap[993];
                if (testStatId) {
                    const hasDesc = statDescriptionsMap[testStatId];
                    console.log(`  Checking "${testStatId}": ${hasDesc ? '✓ ' + hasDesc.substring(0, 50) : '✗ NOT FOUND'}`);
                    
                    // Show first 3 stat descriptions for debugging
                    const firstThreeKeys = Object.keys(statDescriptionsMap).slice(0, 3);
                    console.log(`  Sample stat descriptions: ${firstThreeKeys.map(k => `"${k}": "${statDescriptionsMap[k].substring(0, 30)}..."`).join(', ')}`);
                }
                
                
                // Track stats without descriptions
                let statAlreadyLogged = false;
                
                modsData.forEach(mod => {
                    if (mod._rid) {
                        let displayName = '';
                        
                        // For map anoints and other mods without Names, use StatsKey2
                        if (mod.Name && mod.Name.trim()) {
                            displayName = mod.Name;
                        } else if (mod.StatsKey2) {
                            // Build description from StatsKey2
                            const statId = statsMap[mod.StatsKey2];
                            let template = statId ? statDescriptionsMap[statId] : null;
                            
                            if (template && mod.Stat2Min !== undefined) {
                                // Replace {0} with Stat2Min value
                                displayName = template.replace(/\{0\}/g, mod.Stat2Min).replace(/\{1\}/g, mod.Stat2Max);
                            } else if (statId) {
                                // If no description found, at least show the stat ID
                                displayName = `${statId} ${mod.Stat2Min}`;
                                // Log stats without descriptions for debugging
                                if (!statAlreadyLogged) {
                                    console.log(`⚠️  Stat without description: "${statId}" (StatsKey2=${mod.StatsKey2})`);
                                    statAlreadyLogged = true;
                                }
                            } else {
                                displayName = mod.Id || `Mod ${mod._rid}`;
                            }
                        } else {
                            displayName = mod.Id || `Mod ${mod._rid}`;
                        }
                        
                        modsMap[mod._rid] = displayName;
                    }
                });

                console.log(`Loaded ${oils.length} oils, ${blightCraftingItems.length} crafting items, ${allRecipes.length} recipes, ${allResults.length} results, ${Object.keys(passiveSkillsMap).length} passive skills, ${Object.keys(statsMap).length} stats, ${Object.keys(statDescriptionsMap).length} stat descriptions, ${Object.keys(modsMap).length} mods`);
            } catch (error) {
                console.error('Error loading JSON files:', error);
            }
        }

        // Parse stat descriptions from properly decoded UTF-16LE text
        function parseStatDescriptions(text) {
            // Remove BOM if present
            let cleanText = text;
            if (cleanText.charCodeAt(0) === 0xFEFF) {
                cleanText = cleanText.substring(1);
            }
            
            const lines = cleanText.split(/\r?\n/);
            console.log(`📄 stat_descriptions.txt.gz: ${lines.length} lines (decompressed from gzip, UTF-16LE)`);
            
            let foundCount = 0;
            let statLineCount = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();
                
                // Look for stat ID lines: "1 stat_id" (after tab and digit)
                if (trimmed.startsWith('1 ')) {
                    const statId = trimmed.substring(2).trim();
                    
                    // Must have alphanumeric content and not be just a number
                    if (statId.length > 0 && !statId.match(/^\d+$/)) {
                        statLineCount++;
                        
                        // Look for description in next 30 lines
                        let fullDescriptionText = '';
                        for (let j = i + 1; j < Math.min(i + 30, lines.length); j++) {
                            const nextLine = lines[j];
                            const nextTrimmed = nextLine.trim();
                            
                            // Skip empty, numbers, lang tags
                            if (!nextTrimmed || nextTrimmed.match(/^\d+$/) || nextTrimmed.startsWith('lang ')) {
                                continue;
                            }
                            
                            // Accumulate lines until we find a closing quote
                            fullDescriptionText += ' ' + nextTrimmed;
                            
                            // Check if we have found a complete description (closing quote found)
                            // Match # followed by quoted text (don't require | to be right before #)
                            const descMatch = fullDescriptionText.match(/#\s*"([^"]*)"/);
                            if (descMatch && descMatch[1]) {
                                // Clean up the extracted description (remove extra spaces)
                                const cleanDesc = descMatch[1].replace(/\s+/g, ' ').trim();
                                statDescriptionsMap[statId] = cleanDesc;
                                foundCount++;
                                
                                if (foundCount <= 2) {
                                    console.log(`[${foundCount}] "${statId}": "${cleanDesc.substring(0, 50)}${cleanDesc.length > 50 ? '...' : ''}"`);
                                }
                                break;
                            }
                        }
                    }
                }
            }
            
            console.log(`✓ Parsed: ${statLineCount} stat IDs found, ${foundCount} descriptions extracted`);
            console.log(`  statDescriptionsMap: ${Object.keys(statDescriptionsMap).length} entries`);
        }

        // Build stat description with values inserted into placeholders
        function buildStatDescription(statKeyId, minVal, maxVal) {
            const statId = statsMap[statKeyId];
            if (!statId) {
                // Stat ID not found - skip this one
                return null;
            }
            
            const template = statDescriptionsMap[statId];
            if (!template) {
                // Description template not found in file - skip this one
                return null;
            }
            
            // Replace {0}, {1}, etc. with actual values
            let result = template.replace(/\{0\}/g, minVal).replace(/\{1\}/g, maxVal);
            return result;
        }

        // Helper function to get image filename from oil name
        function getOilImageFilename(oilName) {
            // Map of oil names to image filenames
            const oilImageMap = {
                'Tainted Oil': 'vaaloil.png',
                'Reflective Oil': 'mirroroil.png',
                'Prismatic Oil': 'prismaticoil.png',
                'Clear Oil': 'clearoil.png',
                'Sepia Oil': 'sepiaoil.png',
                'Amber Oil': 'amberoil.png',
                'Verdant Oil': 'verdantoil.png',
                'Teal Oil': 'tealoil.png',
                'Azure Oil': 'azureoil.png',
                'Indigo Oil': 'indigooil.png',
                'Violet Oil': 'violetoil.png',
                'Crimson Oil': 'crimsonoil.png',
                'Black Oil': 'blackoil.png',
                'Opalescent Oil': 'opalescentoil.png',
                'Silver Oil': 'silveroil.png',
                'Golden Oil': 'goldenoil.png'
            };
            
            return oilImageMap[oilName] || null;
        }

        // Render oils table
        function renderOils() {
            const tbody = document.getElementById('oils-tbody');
            tbody.innerHTML = '';

            oils.forEach((oil, index) => {
                const craftingItem = blightCraftingItems[index] || {};
                const useTypeLabel = ['Normal', 'Reserved', 'Special'][craftingItem.UseType || 0];
                const tier = craftingItem.Tier || 0;
                const imagePath = getOilImageFilename(oil.Name);
                
                const row = document.createElement('tr');
                const imageCell = document.createElement('td');
                
                if (imagePath) {
                    const img = document.createElement('img');
                    img.src = `art/2ditems/currency/oils/${imagePath}`;
                    img.alt = oil.Name;
                    img.style.width = '32px';
                    img.style.height = '32px';
                    img.style.maxWidth = '100%';
                    img.title = oil.Name;
                    imageCell.appendChild(img);
                } else {
                    imageCell.textContent = '—';
                }
                
                row.appendChild(imageCell);
                
                const nameCell = document.createElement('td');
                nameCell.textContent = oil.Name || 'Unknown';
                row.appendChild(nameCell);
                
                const shortNameCell = document.createElement('td');
                shortNameCell.textContent = craftingItem.NameShort || 'N/A';
                row.appendChild(shortNameCell);
                
                const tierCell = document.createElement('td');
                tierCell.innerHTML = `<span class="tier-color-${tier}">Tier ${tier}</span>`;
                row.appendChild(tierCell);
                
                const useTypeCell = document.createElement('td');
                useTypeCell.textContent = useTypeLabel;
                row.appendChild(useTypeCell);
                
                const dropLevelCell = document.createElement('td');
                dropLevelCell.textContent = oil.DropLevel || 'N/A';
                row.appendChild(dropLevelCell);
                
                tbody.appendChild(row);
            });
        }

        // Render recipes for given type
        function renderRecipes(typeId) {
            let typeLabel = 'all-tbody';
            let typeNum = -1;

            if (typeId === 'amulet') {
                typeLabel = 'amulet-tbody';
                typeNum = 0;
            } else if (typeId === 'ring') {
                typeLabel = 'ring-tbody';
                typeNum = 1;
            } else if (typeId === 'map') {
                typeLabel = 'map-tbody';
                typeNum = 2;
            }

            const tbody = document.getElementById(typeLabel);
            tbody.innerHTML = '';

            // Filter recipes based on type
            const filtered = typeNum === -1 ? allRecipes : allRecipes.filter(r => r.type === typeNum);

            filtered.forEach(recipe => {
                const result = allResults[recipe.result];
                const searchTerm = document.getElementById('recipe-search').value.toLowerCase();

                // Get result
                let resultName = 'Unknown';
                let resultStats = '';
                if (result) {
                    if (result.PassiveSkill) {
                        const skillData = getPassiveSkillName(result.PassiveSkill);
                        if (typeof skillData === 'object') {
                            resultName = skillData.name;
                            resultStats = skillData.stats;
                        } else {
                            resultName = skillData;
                        }
                    } else if (result.Mod) {
                        const modFullName = getModName(result.Mod);
                        // For maps, put entire mod name in description
                        if (typeNum === 2) {
                            resultName = '';
                            resultStats = modFullName;
                        } else {
                            // For amulets/rings, split by colon if present
                            const colonIndex = modFullName.indexOf(': ');
                            if (colonIndex > -1) {
                                resultStats = modFullName.substring(colonIndex + 2);
                                resultName = modFullName.substring(0, colonIndex);
                            } else {
                                resultName = modFullName;
                            }
                        }
                    }
                }

                // Check if matches search
                const matches = recipe._rid.toString().includes(searchTerm) ||
                               recipe.Id.toLowerCase().includes(searchTerm) ||
                               resultName.toLowerCase().includes(searchTerm) ||
                               resultStats.toLowerCase().includes(searchTerm);

                if (!matches) return;

                // Check if matches oil filter
                if (!matchesOilFilter(recipe.items)) {
                    return;
                }

                // Check if matches tower type filter
                if (result && result.Mod) {
                    if (!matchesTowerFilter(result.Mod)) {
                        return;
                    }
                }

                const row = document.createElement('tr');

                // Helper function to create a single oil item with image only
                function createOilItem(itemIndex) {
                    const container = document.createElement('div');
                    container.style.display = 'inline-flex';
                    container.style.alignItems = 'center';
                    container.style.gap = '0px';
                    container.style.minWidth = 'auto';
                    container.style.flexShrink = '0';
                    container.style.height = 'auto';
                    container.style.lineHeight = 'normal';
                    
                    const oilName = blightCraftingItems[itemIndex]?.NameShort || `Oil #${itemIndex}`;
                    const craftingItem = blightCraftingItems[itemIndex];
                    
                    if (craftingItem && craftingItem.Oil !== undefined) {
                        const oil = oils.find(o => o._rid === craftingItem.Oil);
                        if (oil) {
                            const imagePath = getOilImageFilename(oil.Name);
                            
                            if (imagePath) {
                                const img = document.createElement('img');
                                img.src = `art/2ditems/currency/oils/${imagePath}`;
                                img.alt = oil.Name;
                                img.style.width = '24px';
                                img.style.height = '24px';
                                img.style.flexShrink = '0';
                                img.style.display = 'block';
                                img.title = oil.Name;
                                container.appendChild(img);
                                return container;
                            }
                        }
                    }
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = oilName;
                    nameSpan.style.whiteSpace = 'nowrap';
                    container.appendChild(nameSpan);
                    
                    return container;
                }

                // Helper function to create combined oils cell
                function createCombinedOilsCell(itemIndices) {
                    const cell = document.createElement('td');
                    cell.style.padding = '8px 10px';
                    cell.style.verticalAlign = 'middle';
                    cell.style.height = 'auto';
                    cell.style.lineHeight = 'normal';
                    
                    const container = document.createElement('div');
                    container.style.display = 'flex';
                    container.style.alignItems = 'center';
                    container.style.justifyContent = 'flex-start';
                    container.style.gap = '0px';
                    container.style.flexWrap = 'nowrap';
                    container.style.overflow = 'hidden';
                    container.style.height = '24px';
                    
                    itemIndices.forEach((index) => {
                        container.appendChild(createOilItem(index));
                    });
                    
                    cell.appendChild(container);
                    return cell;
                }

                if (typeNum === 0) {
                    // Amulet: 3 oils in one cell
                    row.appendChild(createCombinedOilsCell([recipe.items[0], recipe.items[1], recipe.items[2]]));
                    row.appendChild(createTableCell(resultName));
                    row.appendChild(createTableCell(resultStats));
                } else if (typeNum === 1) {
                    // Ring: 2 oils in one cell
                    row.appendChild(createCombinedOilsCell([recipe.items[0], recipe.items[1]]));
                    row.appendChild(createTableCell(resultName));
                    row.appendChild(createTableCell(resultStats));
                } else if (typeNum === 2) {
                    // Map: 1 oil - put content in Anoint, leave Description empty
                    row.appendChild(createCombinedOilsCell([recipe.items[0]]));
                    row.appendChild(createTableCell(resultStats));
                    row.appendChild(createTableCell(''));
                } else if (typeNum === -1) {
                    // All: determine based on recipe type
                    if (recipe.type === 0) {
                        // Amulet: 3 oils
                        row.appendChild(createCombinedOilsCell([recipe.items[0], recipe.items[1], recipe.items[2]]));
                    } else if (recipe.type === 1) {
                        // Ring: 2 oils
                        row.appendChild(createCombinedOilsCell([recipe.items[0], recipe.items[1]]));
                    } else if (recipe.type === 2) {
                        // Map: 1 oil
                        row.appendChild(createCombinedOilsCell([recipe.items[0]]));
                    }
                    
                    if (recipe.type === 2) {
                        // Map: put content in Anoint, leave Description empty
                        row.appendChild(createTableCell(resultStats));
                        row.appendChild(createTableCell(''));
                    } else {
                        // Amulet or Ring: normal layout
                        row.appendChild(createTableCell(resultName));
                        row.appendChild(createTableCell(resultStats));
                    }
                }

                tbody.appendChild(row);
            });
        }

        // Helper function to create a simple table cell
        function createTableCell(content, isHtml = false) {
            const cell = document.createElement('td');
            if (isHtml) {
                cell.innerHTML = content;
            } else {
                // Convert newlines to <br> tags for proper line breaks in table cells
                const htmlContent = content.replace(/\n/g, '<br>');
                cell.innerHTML = htmlContent;
            }
            return cell;
        }

        // Initialize tower type filters and oil filters
        function initializeTowerFilters() {
            // Find which oils are actually used in recipes
            const usedOilRids = new Set();
            allRecipes.forEach(recipe => {
                recipe.items.forEach(itemIndex => {
                    const craftingItem = blightCraftingItems[itemIndex];
                    if (craftingItem && craftingItem.Oil !== undefined) {
                        usedOilRids.add(craftingItem.Oil);
                    }
                });
            });

            // Initialize oil filters - only for oils used in recipes
            const oilContainer = document.getElementById('oil-filters');
            oilContainer.innerHTML = '';
            
            oils.forEach(oil => {
                // Only add pill if this oil is used in at least one recipe
                if (usedOilRids.has(oil._rid)) {
                    const pill = document.createElement('div');
                    pill.className = 'filter-pill';
                    pill.textContent = oil.NameShort || oil.Name;
                    pill.dataset.oilId = oil._rid;
                    pill.onclick = function() {
                        toggleOilFilter(oil._rid, pill);
                    };
                    oilContainer.appendChild(pill);
                }
            });

            // Initialize tower filters
            const towerContainer = document.getElementById('tower-filters');
            towerContainer.innerHTML = '';
            
            towerTypes.forEach(towerType => {
                const pill = document.createElement('div');
                pill.className = 'filter-pill';
                pill.textContent = towerType;
                pill.onclick = function() {
                    toggleTowerFilter(towerType);
                };
                towerContainer.appendChild(pill);
            });
            
            // Update filter UI visibility based on initial tab
            updateFilterPanelVisibility();
        }

        // Toggle oil filter selection (max depends on tab)
        function toggleOilFilter(oilId, pillElement) {
            const currentTab = getCurrentTab();
            const maxOils = maxOilsByTab[currentTab] || 3;
            
            const index = selectedOils.indexOf(oilId);
            
            if (index > -1) {
                // Already selected, remove it
                selectedOils.splice(index, 1);
            } else {
                // Not selected
                if (selectedOils.length < maxOils) {
                    // Can add more
                    selectedOils.push(oilId);
                } else {
                    // Max oils selected for this tab, don't add
                    return;
                }
            }
            
            // Update UI
            updateOilFilterUI();
            
            // Re-render recipes
            renderRecipes(currentTab);
        }

        // Toggle tower filter selection (max 2)
        function toggleTowerFilter(towerType) {
            const index = selectedTowerTypes.indexOf(towerType);
            
            if (index > -1) {
                // Already selected, remove it
                selectedTowerTypes.splice(index, 1);
            } else {
                // Not selected
                if (selectedTowerTypes.length < 2) {
                    // Can add more
                    selectedTowerTypes.push(towerType);
                } else {
                    // Max 2 selected, don't add
                    return;
                }
            }
            
            // Update UI
            updateTowerFilterUI();
            
            // Re-render recipes
            renderRecipes(getCurrentTab());
        }

        // Get current active tab
        function getCurrentTab() {
            const active = document.querySelector('.tab-content.active');
            if (!active) return 'all';
            return active.id;
        }

        // Update tower filter pill UI
        function updateTowerFilterUI() {
            const pills = document.querySelectorAll('#tower-filters .filter-pill');
            pills.forEach(pill => {
                const towerType = pill.textContent;
                
                if (selectedTowerTypes.includes(towerType)) {
                    pill.classList.add('active');
                    pill.classList.remove('disabled');
                } else if (selectedTowerTypes.length >= 2) {
                    pill.classList.remove('active');
                    pill.classList.add('disabled');
                } else {
                    pill.classList.remove('active');
                    pill.classList.remove('disabled');
                }
            });
        }

        // Update oil filter pill UI
        // Get oils that are compatible with current selection
        function getCompatibleOils() {
            if (selectedOils.length === 0) {
                // No oils selected, all oils are compatible
                return new Set(oils.map(oil => oil.RID));
            }
            
            // Find all recipes that match current selection
            const compatibleOils = new Set();
            
            allRecipes.forEach(recipe => {
                // Check if this recipe matches the current oil selection (AND logic)
                const recipeOils = new Set();
                recipe.items.forEach(itemIndex => {
                    const craftingItem = blightCraftingItems[itemIndex];
                    if (craftingItem && craftingItem.Oil !== undefined) {
                        recipeOils.add(craftingItem.Oil);
                    }
                });
                
                // Check if all selected oils are in this recipe
                if (selectedOils.every(selectedOilRid => recipeOils.has(selectedOilRid))) {
                    // This recipe matches our current selection
                    // Add all oils from this recipe to compatible set
                    recipeOils.forEach(oilRid => compatibleOils.add(oilRid));
                }
            });
            
            return compatibleOils;
        }

        function updateOilFilterUI() {
            const currentTab = getCurrentTab();
            const maxOils = maxOilsByTab[currentTab] || 3;
            const compatibleOils = getCompatibleOils();
            
            const pills = document.querySelectorAll('#oil-filters .filter-pill');
            pills.forEach(pill => {
                const oilId = parseInt(pill.dataset.oilId);
                
                if (selectedOils.includes(oilId)) {
                    // Currently selected
                    pill.classList.add('active');
                    pill.classList.remove('disabled');
                } else if (!compatibleOils.has(oilId)) {
                    // Not compatible with current selection
                    pill.classList.remove('active');
                    pill.classList.add('disabled');
                } else if (selectedOils.length >= maxOils) {
                    // Max reached and not selected
                    pill.classList.remove('active');
                    pill.classList.add('disabled');
                } else {
                    // Compatible and available
                    pill.classList.remove('active');
                    pill.classList.remove('disabled');
                }
            });
        }

        // Show/hide tower filter section based on active tab
        function updateFilterPanelVisibility() {
            const currentTab = getCurrentTab();
            const towerSection = document.getElementById('tower-filter-section');
            const maxOils = maxOilsByTab[currentTab] || 3;
            
            if (currentTab === 'ring') {
                // Show tower filters only for ring tab
                towerSection.classList.remove('hidden');
            } else {
                // Hide tower filters for other tabs
                towerSection.classList.add('hidden');
            }
            
            // Trim selected oils if they exceed max for this tab
            if (selectedOils.length > maxOils) {
                selectedOils = selectedOils.slice(0, maxOils);
            }
            
            // Update oil filter UI on tab switch
            updateOilFilterUI();
        }

        // Helper function to check if mod matches tower type filter
        function matchesTowerFilter(modId) {
            if (selectedTowerTypes.length === 0) {
                // No filter active, all mods match
                return true;
            }
            
            const mod = allMods.find(m => m._rid === modId);
            if (!mod) return false;
            
            const modName = mod.Name || '';
            
            // Check if mod name contains any of the selected tower types
            return selectedTowerTypes.some(towerType => modName.includes(towerType));
        }

        // Helper function to check if recipe matches oil filter
        function matchesOilFilter(recipeItemIndices) {
            if (selectedOils.length === 0) {
                // No filter active, all recipes match
                return true;
            }
            
            // Get all oils in this recipe
            const recipeOils = new Set();
            recipeItemIndices.forEach(itemIndex => {
                const craftingItem = blightCraftingItems[itemIndex];
                if (craftingItem && craftingItem.Oil !== undefined) {
                    recipeOils.add(craftingItem.Oil);
                }
            });
            
            // Check if ALL selected oils are in this recipe
            return selectedOils.every(selectedOilRid => recipeOils.has(selectedOilRid));
        }

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Deactivate all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');

            // Activate selected button
            event.target.classList.add('active');

            // Clear tower filters when switching tabs (not available for non-ring tabs)
            if (tabName !== 'ring') {
                selectedTowerTypes = [];
                updateTowerFilterUI();
            }
            
            // Update filter panel visibility
            updateFilterPanelVisibility();

            // Render recipes for this type
            renderRecipes(tabName);
        }

        // Search
        document.getElementById('recipe-search').addEventListener('keyup', function() {
            const activeTab = document.querySelector('.tab-content.active').id;
            renderRecipes(activeTab);
        });
    </script>
